<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <!-- Yellow background -->
  <rect width="500" height="200" fill="#FFD700"/>
  <!-- Halal circle badge -->
  <circle cx="80" cy="100" r="60" fill="white" stroke="black" stroke-width="3"/>
  <circle cx="80" cy="100" r="50" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Arabic halal text approximation -->
  <text x="80" y="90" text-anchor="middle" font-size="16" font-weight="bold" font-family="serif" fill="black">حلال</text>
  <text x="80" y="112" text-anchor="middle" font-size="10" font-weight="bold" font-family="sans-serif" fill="black">HALAL</text>
  <!-- Company name -->
  <text x="290" y="85" text-anchor="middle" font-size="42" font-weight="900" font-family="'Arial Black', sans-serif" fill="black">Shinjuku</text>
  <text x="290" y="135" text-anchor="middle" font-size="38" font-weight="900" font-family="'Arial Black', sans-serif" fill="black">HalalFood</text>
</svg>
