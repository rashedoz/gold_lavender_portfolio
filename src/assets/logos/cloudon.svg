<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <!-- White background -->
  <rect width="560" height="280" fill="white"/>

  <!-- Cloud shape with gradient purple -->
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cloud body (left side of composition) -->
  <g transform="translate(20, 10)">
    <!-- Main cloud path -->
    <path d="
      M 90,160
      Q 40,160 40,120
      Q 40,90 65,82
      Q 62,72 62,62
      Q 62,32 90,22
      Q 110,14 130,26
      Q 140,10 162,8
      Q 196,4 210,30
      Q 228,18 248,22
      Q 272,26 272,52
      Q 272,60 268,68
      Q 290,76 290,102
      Q 290,130 262,140
      Q 258,160 230,160
      Z
    " fill="url(#cloudGrad)" />

    <!-- WiFi arc 1 (outermost, inside cloud top) -->
    <path d="M 110,90 Q 165,50 220,90" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
    <!-- WiFi arc 2 -->
    <path d="M 126,108 Q 165,80 204,108" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <!-- WiFi arc 3 (innermost) -->
    <path d="M 142,126 Q 165,112 188,126" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="165" cy="142" r="7" fill="white" opacity="0.9"/>
  </g>

  <!-- "CloudOn" text -->
  <!-- "Cloud" portion in black -->
  <text x="330" y="170" text-anchor="middle" font-size="80" font-weight="900"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" fill="#111111"
        letter-spacing="-2">Cloud</text>

  <!-- WiFi/target "O" in purple replacing the O in "On" -->
  <!-- Position "O" circle -->
  <circle cx="415" cy="148" r="34" fill="none" stroke="#7C3AED" stroke-width="8"/>
  <circle cx="415" cy="148" r="18" fill="none" stroke="#7C3AED" stroke-width="6"/>
  <circle cx="415" cy="148" r="7"  fill="#9333EA"/>

  <!-- "n" in black after the O -->
  <text x="472" y="170" text-anchor="start" font-size="80" font-weight="900"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" fill="#111111"
        letter-spacing="-2">n</text>
</svg>
