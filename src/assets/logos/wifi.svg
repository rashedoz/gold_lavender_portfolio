<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <!-- White background -->
  <rect width="500" height="300" fill="white"/>
  <!-- Phone icon (tilted) -->
  <g transform="translate(250, 80) rotate(-10)">
    <rect x="-30" y="-50" width="60" height="90" rx="8" fill="none" stroke="#3A5F2A" stroke-width="5"/>
    <rect x="-20" y="-42" width="40" height="60" rx="4" fill="#3A5F2A" opacity="0.1"/>
    <circle cx="0" cy="32" r="5" fill="#3A5F2A"/>
  </g>
  <!-- WiFi arcs -->
  <g transform="translate(250, 155)">
    <path d="M-35 0 Q0,-35 35,0" fill="none" stroke="#3A5F2A" stroke-width="6" stroke-linecap="round"/>
    <path d="M-22 8 Q0,-18 22,8" fill="none" stroke="#3A5F2A" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="16" r="5" fill="#3A5F2A"/>
  </g>
  <!-- Text -->
  <text x="250" y="215" text-anchor="middle" font-size="32" font-weight="900" font-family="sans-serif" fill="#3A5F2A">ShinjukuWiFi</text>
  <text x="250" y="258" text-anchor="middle" font-size="26" font-weight="700" font-family="sans-serif" fill="#1A1A1A">&amp; Mobile Shop</text>
</svg>
